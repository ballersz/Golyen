<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Guess Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            background: white;
            border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3),
                        0 0 40px rgba(102, 126, 234, 0.2);
            padding: 50px 40px 40px 40px;
            max-width: 500px;
            text-align: center;
            animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 2;
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        /* Decorative corner elements */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, transparent 70%);
            border-radius: 0 0 20px 0;
            opacity: 0.1;
        }

        .container::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 100px;
            height: 100px;
            background: linear-gradient(225deg, #764ba2 0%, transparent 70%);
            border-radius: 20px 0 0 0;
            opacity: 0.1;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
            font-size: 2.8em;
            font-weight: 800;
            letter-spacing: -1px;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { text-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
            50% { text-shadow: 0 0 30px rgba(102, 126, 234, 0.5); }
        }

        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 1.05rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .game-info {
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f1ff 100%);
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            border-left: 5px solid #667eea;
            border: 2px solid rgba(102, 126, 234, 0.2);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.1);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .game-info:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(102, 126, 234, 0.15);
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .info-item {
            margin: 12px 0;
            font-size: 1.1em;
            color: #333;
            font-weight: 500;
        }

        .info-label {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        input {
            width: 100%;
            padding: 16px 18px;
            font-size: 1.1em;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin-bottom: 15px;
            background: #f9f9f9;
            color: #333;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1),
                        0 4px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: #bbb;
            font-weight: 400;
        }

        button {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1em;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-guess {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .btn-guess:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.4);
        }

        .btn-guess:active {
            transform: translateY(-1px);
        }

        .btn-reset {
            background: linear-gradient(135deg, #f5f5f5 0%, #e8e8e8 100%);
            color: #667eea;
            font-weight: 700;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        .btn-reset:hover {
            background: linear-gradient(135deg, #eeeeee 0%, #e0e0e0 100%);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .message {
            font-size: 1.15em;
            padding: 22px;
            border-radius: 12px;
            margin-bottom: 20px;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            border: 2px solid;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.12);
            letter-spacing: 0.3px;
        }

        .message.correct {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border-color: #28a745;
            animation: bounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 8px 20px rgba(40, 167, 69, 0.2);
        }

        .message.incorrect {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            border-color: #f5c6cb;
            animation: shake 0.4s;
            box-shadow: 0 8px 20px rgba(220, 53, 69, 0.2);
        }

        .message.info {
            background: linear-gradient(135deg, #d1ecf1 0%, #bee5eb 100%);
            color: #0c5460;
            border-color: #bee5eb;
            animation: fadeInDown 0.4s ease;
            box-shadow: 0 8px 20px rgba(23, 162, 184, 0.15);
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            25% { transform: translateY(-8px) scale(1.02); }
            50% { transform: translateY(0) scale(1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-10px) rotate(-1deg); }
            75% { transform: translateX(10px) rotate(1deg); }
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stats {
            background: linear-gradient(135deg, #fff3cd 0%, #ffeeba 100%);
            padding: 22px;
            border-radius: 15px;
            margin-top: 25px;
            border: 2px solid rgba(255, 193, 7, 0.3);
            box-shadow: 0 8px 20px rgba(255, 193, 7, 0.15);
            animation: fadeInUp 0.6s ease 0.5s both;
            transition: all 0.3s ease;
        }

        .stats:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(255, 193, 7, 0.2);
        }

        .stats-title {
            color: #856404;
            font-weight: 800;
            margin-bottom: 15px;
            font-size: 1.1em;
            letter-spacing: 0.5px;
        }

        .stat-row {
            color: #856404;
            margin: 12px 0;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat-row strong {
            font-weight: 800;
            color: #663c00;
            font-size: 1.1em;
        }

        /* Responsive Design */
        @media (max-width: 600px) {
            .container {
                padding: 35px 25px 25px 25px;
                margin: 0 15px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            button, input {
                font-size: 1em;
                padding: 14px 16px;
            }

            .message {
                font-size: 1em;
                padding: 18px;
                min-height: 60px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎲 Number Guess Game</h1>
        <p class="subtitle">Guess the random number and win!</p>

        <div id="messageBox" class="message info" style="display: none;"></div>

        <div class="game-info">
            <div class="info-item">
                <span class="info-label">Range:</span> 1 to <span id="maxNumber">100</span>
            </div>
            <div class="info-item">
                <span class="info-label">Difficulty:</span> <span id="difficultyLevel">Easy</span>
            </div>
        </div>

        <div class="input-group">
            <input type="number" id="guessInput" placeholder="Enter your guess..." min="1">
            <button class="btn-guess" onclick="makeGuess()">Guess!</button>
        </div>

        <button class="btn-reset" onclick="resetGame()">New Game</button>

        <div class="stats">
            <div class="stats-title">📊 Statistics</div>
            <div class="stat-row">Attempts: <strong id="attempts">0</strong></div>
            <div class="stat-row">Games Won: <strong id="gamesWon">0</strong></div>
            <div class="stat-row">High Score: <strong id="highScore">∞</strong></div>
        </div>
    </div>

    <script>
        let secretNumber;
        let attempts = 0;
        let gamesWon = 0;
        let highScore = Infinity;
        let maxNumber = 100;
        let gameWon = false;

        const difficulties = {
            easy: 100,
            medium: 50,
            hard: 20
        };

        function getRandomDifficulty() {
            const keys = Object.keys(difficulties);
            const randomDifficulty = keys[Math.floor(Math.random() * keys.length)];
            return randomDifficulty;
        }

        function startNewGame() {
            const difficulty = getRandomDifficulty();
            maxNumber = difficulties[difficulty];
            secretNumber = Math.floor(Math.random() * maxNumber) + 1;
            attempts = 0;
            gameWon = false;

            document.getElementById('maxNumber').textContent = maxNumber;
            document.getElementById('difficultyLevel').textContent = 
                difficulty.charAt(0).toUpperCase() + difficulty.slice(1);
            document.getElementById('attempts').textContent = attempts;
            document.getElementById('guessInput').value = '';
            document.getElementById('messageBox').style.display = 'none';
            document.getElementById('guessInput').focus();
        }

        function makeGuess() {
            const guess = parseInt(document.getElementById('guessInput').value);
            const messageBox = document.getElementById('messageBox');

            if (isNaN(guess) || guess < 1 || guess > maxNumber) {
                showMessage(`Please enter a number between 1 and ${maxNumber}!`, 'info');
                return;
            }

            attempts++;
            const attemptsDisplay = document.getElementById('attempts');
            attemptsDisplay.textContent = attempts;

            if (guess === secretNumber) {
                gamesWon++;
                gameWon = true;
                if (attempts < highScore) {
                    highScore = attempts;
                    document.getElementById('highScore').textContent = highScore;
                }
                document.getElementById('gamesWon').textContent = gamesWon;
                showMessage(`🎉 Correct! It took ${attempts} attempt${attempts > 1 ? 's' : ''}! Press "New Game" to play again!`, 'correct');
                document.getElementById('guessInput').disabled = true;
            } else if (guess < secretNumber) {
                showMessage(`📈 Too low! Try a higher number.`, 'incorrect');
            } else {
                showMessage(`📉 Too high! Try a lower number.`, 'incorrect');
            }

            document.getElementById('guessInput').value = '';
            if (!gameWon) document.getElementById('guessInput').focus();
        }

        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'flex';
        }

        function resetGame() {
            document.getElementById('guessInput').disabled = false;
            startNewGame();
        }

        // Event listener for Enter key
        document.getElementById('guessInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter' && !gameWon) {
                makeGuess();
            }
        });

        // Start the first game
        startNewGame();
    </script>
</body>
</html>
